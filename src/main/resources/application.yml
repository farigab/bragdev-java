spring:
  application:
    name: bragdoc

  datasource:
    url: ${DB_URL:}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        temp:
          use_jdbc_metadata_defaults: false

server:
  port: 8080

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-flash-latest

logging:
  level:
    farigab.bragdoc: INFO
    org.hibernate.SQL: DEBUG

github:
  oauth:
    client-id: ${GITHUB_OAUTH_CLIENT_ID:}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/callback}
    frontend-redirect-uri: ${OAUTH_FRONTEND_REDIRECT:http://localhost:4200/auth-callback}

jwt:
  secret: ${JWT_SECRET}
